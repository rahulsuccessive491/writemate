<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WriteMate</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="brand">
      <div class="brand-icon">W</div>
      <span class="brand-name">WriteMate</span>
      <span class="version">v1.0</span>
    </div>
    <div class="status" id="status">
      <span class="status-dot" id="statusDot"></span>
      <span class="status-label" id="statusLabel">Connecting…</span>
    </div>
  </div>

  <!-- Hint -->
  <div class="hint">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 15l6 6m-11-4a7 7 0 1 1 0-14 7 7 0 0 1 0 14z"/></svg>
    Select text on any page and right-click to rephrase
  </div>

  <!-- Divider -->
  <div class="divider"><span>or rephrase here</span></div>

  <!-- Input -->
  <div class="input-wrap">
    <textarea id="inputText" placeholder="Paste your text…" rows="4" maxlength="3000"></textarea>
    <div class="char-count"><span id="charCount">0</span> / 3000</div>
  </div>

  <!-- Mode selector -->
  <div class="mode-label">Tone</div>
  <div class="mode-grid">
    <button class="mode-btn active" data-mode="professional">
      <span class="mode-icon">💼</span> Professional
    </button>
    <button class="mode-btn" data-mode="casual">
      <span class="mode-icon">💬</span> Casual
    </button>
    <button class="mode-btn" data-mode="bullet_points">
      <span class="mode-icon">📋</span> Bullets
    </button>
    <button class="mode-btn" data-mode="concise">
      <span class="mode-icon">✂️</span> Concise
    </button>
  </div>

  <!-- Action -->
  <button class="rephrase-btn" id="rephraseBtn">
    <span id="btnText">Rephrase</span>
    <span class="btn-shortcut">↵</span>
  </button>

  <!-- Result -->
  <div class="result-box hidden" id="resultBox">
    <div class="result-header">
      <span class="result-meta" id="resultMeta"></span>
      <button class="copy-btn" id="copyBtn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        <span id="copyLabel">Copy</span>
      </button>
    </div>
    <div class="result-text" id="resultText"></div>
  </div>

  <!-- Error -->
  <div class="error-box hidden" id="errorBox">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span id="errorMsg"></span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
